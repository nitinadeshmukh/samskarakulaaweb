<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>__TITLE__</title>
    <meta name="description" content="__DESCRIPTION__" />
    <link rel="canonical" href="__CANONICAL__" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Samskara Kula" />
    <meta property="og:title" content="__TITLE__" />
    <meta property="og:description" content="__DESCRIPTION__" />
    <meta property="og:url" content="__CANONICAL__" />
    <meta property="og:image" content="https://samskarakula.com/logo.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="__TITLE__" />
    <meta name="twitter:description" content="__DESCRIPTION__" />
    <meta name="twitter:image" content="https://samskarakula.com/logo.png" />

    <!-- Site-wide structured data — same on every route (FAQPage schema for
         the homepage FAQ lives alongside FAQ.tsx's content instead, so it
         can't drift from what's actually rendered there). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://samskarakula.com/#organization",
            "name": "Samskara Kula",
            "url": "https://samskarakula.com/",
            "logo": "https://samskarakula.com/logo.png",
            "description": "A family-tree-driven ritual calendar, vetted priest marketplace, and tamper-evident Proof-of-Ritual archive for Hindu life-cycle samskaras (Shodasha Samskaras)."
          },
          {
            "@type": "WebSite",
            "@id": "https://samskarakula.com/#website",
            "url": "https://samskarakula.com/",
            "name": "Samskara Kula",
            "publisher": { "@id": "https://samskarakula.com/#organization" }
          }
        ]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Meta Pixel — gated on VITE_META_PIXEL_ID (Vite's %VAR% HTML env
         replacement, same mechanism as this file's __TITLE__ etc. but
         Vite-native, not scripts/prerender.js's). Guarded so an unset/
         un-substituted id (literal "%VITE_META_PIXEL_ID%", or empty if Vite
         did substitute an empty env value) never calls fbq('init', '') —
         matches src/lib/analytics.ts's "a missing env var must degrade to
         silently-off, never crash/misbehave" rule. -->
    <script>
      (function () {
        var pixelId = '%VITE_META_PIXEL_ID%';
        if (!pixelId || pixelId.charAt(0) === '%') return;
        !(function (f, b, e, v, n, t, s) {
          if (f.fbq) return;
          n = f.fbq = function () {
            n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n;
          n.loaded = !0;
          n.version = '2.0';
          n.queue = [];
          t = b.createElement(e);
          t.async = !0;
          t.src = v;
          s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
        })(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
        window.fbq('init', pixelId);
        window.fbq('track', 'PageView');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
