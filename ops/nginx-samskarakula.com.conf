# nginx server block for samskarakula.com — static site, served from
# /var/www/samskarakula.com (matches the rsync remote_path in
# .github/workflows/deploy.yml).
#
# Install:
#   sudo mkdir -p /var/www/samskarakula.com
#   sudo cp nginx-samskarakula.com.conf /etc/nginx/sites-available/samskarakula.com
#   sudo ln -s /etc/nginx/sites-available/samskarakula.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d samskarakula.com -d www.samskarakula.com

server {
    listen 80;
    server_name samskarakula.com www.samskarakula.com;
    root /var/www/samskarakula.com;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
