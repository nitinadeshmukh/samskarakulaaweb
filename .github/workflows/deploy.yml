name: Deploy website

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build
        env:
          # Public anon key — safe to bake into a client bundle (RLS-scoped,
          # same value already shipped in all 3 Expo apps' bundles). Not a
          # GitHub secret because it isn't one; the outage this fixes was
          # this var being *absent* in CI, not it being sensitive.
          VITE_SUPABASE_URL: https://api.samskarakula.com
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzgyOTcwNDIzLCJleHAiOjE5NDA2NTA0MjN9.hfK1ppf2SRaNw9r_pVFnjJK6KWVYEk72BNsywAdLQ48
          # Real Pixel ID (Events Manager, ParkTle business portfolio,
          # dataset "Samskara Kula") — not a secret, ends up in the public
          # JS bundle regardless, same as the two vars above.
          VITE_META_PIXEL_ID: "1019125254167784"

      - name: Sync static build to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /var/www/samskarakula.com/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
